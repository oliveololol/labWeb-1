<main class="content">

<section class="content-card">

<h2>Контактна інформація</h2>

<p>Email:
<a href="mailto:kovalovivan@ukr.net">kovalovivan@ukr.net</a>
</p>

<p>Телефон:
<a href="tel:+380991112233">+380991112233</a>
</p>

<form class="contact-form" action="#" method="post">

<fieldset>

<legend>Контактні дані</legend>

<label for="name">Ім'я</label>

<input
type="text"
id="name"
name="name"
placeholder="Ваше ім'я"
required>

<br><br>

<label for="email">Email</label>

<input
type="email"
id="email"
name="email"
placeholder="example@email.com"
required>

</fieldset>

<br>

<fieldset>

<legend>Повідомлення</legend>

<label for="subject">Тема</label>

<select id="subject" name="subject" required>

<option value="">Оберіть тему</option>

<option>Загальне питання</option>

<option>Співпраця</option>

<option>Відгук</option>

</select>

<br><br>

<p>Тип звернення</p>

<label class="option-label">

<input type="radio" name="type" required>

Питання

</label>

<label class="option-label">

<input type="radio" name="type">

Пропозиція

</label>

<label class="option-label">

<input type="radio" name="type">

Скарга

</label>

<br><br>

<label for="message">

Повідомлення

</label>

<br>

<textarea
id="message"
name="message"
rows="6"
cols="40"
placeholder="Ваше повідомлення">
</textarea>

<br><br>

<label class="option-label">

<input
type="checkbox"
required>

Погоджуюсь на обробку персональних даних

</label>

<br><br>

<button type="submit">

Надіслати

</button>

</fieldset>

</form>

</section>
